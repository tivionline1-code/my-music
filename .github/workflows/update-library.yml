name: Update music library

on:
  push:
    paths:
      - "music/**"
      - "generate-library.js"

permissions:
  contents: write

jobs:
  update-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node generate-library.js
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update music library"
